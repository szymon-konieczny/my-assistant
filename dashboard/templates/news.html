{% extends "base.html" %}

{% block title %}News — Progrise{% endblock %}

{% block content %}
    <header>
        <div class="header-top">
            <h1>News</h1>
            <div class="header-actions">
                <button class="btn" onclick="toggleSettings()">Settings</button>
                <button class="btn" onclick="showSummary()">Summary</button>
                <button class="btn btn-primary" onclick="fetchNow()">Fetch Now</button>
            </div>
        </div>
    </header>

    <div class="tab-bar" id="category-tabs">
        <button class="tab active" data-cat="" onclick="filterCategory('')">All</button>
    </div>

    <div class="section" id="settings-panel" style="display:none">
        <div class="section-header">
            <h2>Categories &amp; Feeds</h2>
        </div>
        <div id="categories-settings" style="padding: 16px 20px;"></div>
        <div style="padding: 0 20px 16px;">
            <div style="display:flex; gap:8px; align-items:center;">
                <input type="text" id="new-cat-name" placeholder="New category name" style="padding:6px 12px; border:1px solid var(--border); border-radius:6px; font-size:14px; flex:1;">
                <input type="text" id="new-cat-feeds" placeholder="Feed URLs (comma-separated)" style="padding:6px 12px; border:1px solid var(--border); border-radius:6px; font-size:14px; flex:2;">
                <button class="btn btn-primary" onclick="addCategory()">Add</button>
            </div>
        </div>
    </div>

    <div id="articles-list"></div>

    <div class="drawer" id="article-drawer">
        <div class="drawer-header">
            <h3 id="drawer-title"></h3>
            <button class="modal-close" onclick="closeDrawer()">&times;</button>
        </div>
        <div class="drawer-meta" id="drawer-meta"></div>
        <div class="drawer-body" id="drawer-body"></div>
    </div>
    <div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>

    <div class="modal-overlay" id="summary-modal" onclick="closeSummary(event)">
        <div class="modal">
            <div class="modal-header">
                <h2>News Summary</h2>
                <button class="modal-close" onclick="closeSummary()">&times;</button>
            </div>
            <div class="modal-body" id="summary-content">
                Loading...
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
    <script src="/static/news.js"></script>
{% endblock %}
